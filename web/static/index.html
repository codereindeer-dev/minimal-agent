<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>minimal-agent</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div id="app">
    <aside id="sidebar">
      <header class="sb-header">
        <h1>minimal-agent</h1>
        <div class="sb-provider">
          <select id="provider-select">
            <option value="anthropic">anthropic</option>
            <option value="openai">openai</option>
          </select>
          <input id="model-input" type="text" placeholder="model" maxlength="60">
          <button id="provider-apply">↻</button>
        </div>
      </header>

      <section class="sb-section">
        <div class="sb-title">Sessions</div>
        <div class="sb-actions">
          <input id="session-name" type="text" placeholder="name to save…" maxlength="40">
          <button id="session-save">Save</button>
        </div>
        <ul id="session-list" class="sb-list"></ul>
      </section>

      <section class="sb-section">
        <div class="sb-title">
          Memories <span id="mem-count" class="sb-count"></span>
          <span id="mem-backend" class="sb-badge" title="Active memory backend (read-only)"></span>
        </div>
        <div class="sb-actions">
          <input id="mem-search" type="text" placeholder="semantic search…" maxlength="120">
          <button id="mem-search-btn">Search</button>
        </div>
        <ul id="memory-list" class="sb-list"></ul>
      </section>

      <section class="sb-section">
        <div class="sb-title">Skills <span id="skill-count" class="sb-count"></span></div>
        <ul id="skill-list" class="sb-list"></ul>
      </section>
    </aside>

    <div id="main">
      <main id="chat"></main>

      <div id="chat-footer">
        <div id="token-meter" title="Input tokens used / model context window limit"></div>
        <div class="footer-actions">
          <button id="btn-compact" title="Roll the whole history into a single summary">Compact</button>
          <button id="btn-reset"   title="Clear the conversation history">Reset</button>
        </div>
      </div>

      <form id="input-form">
        <textarea
          id="input"
          placeholder="Type a message... (Enter to send, Shift+Enter for newline)"
          rows="2"
          autofocus
        ></textarea>
        <button type="submit">Send</button>
      </form>
    </div>
  </div>
  <script src="/static/app.js"></script>
</body>
</html>
